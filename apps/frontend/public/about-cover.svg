<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- bapX About Page Cover SVG -->
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#aboutGrad)"/>
  <rect width="1200" height="675" fill="url(#gridPattern)"/>
  
  <!-- Abstract AI Network Nodes -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="8" fill="white"/>
    <circle cx="400" cy="250" r="6" fill="white"/>
    <circle cx="600" cy="180" r="10" fill="white"/>
    <circle cx="800" cy="300" r="7" fill="white"/>
    <circle cx="1000" cy="200" r="9" fill="white"/>
    <circle cx="300" cy="400" r="7" fill="white"/>
    <circle cx="500" cy="500" r="8" fill="white"/>
    <circle cx="700" cy="450" r="6" fill="white"/>
    <circle cx="900" cy="500" r="9" fill="white"/>
    
    <!-- Connection Lines -->
    <line x1="200" y1="150" x2="400" y2="250" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="250" x2="600" y2="180" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="600" y1="180" x2="800" y2="300" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="300" x2="1000" y2="200" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="300" y1="400" x2="500" y2="500" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="500" y1="500" x2="700" y2="450" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="700" y1="450" x2="900" y2="500" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- bapX Logo Mark (Large, Centered) -->
  <g transform="translate(600, 337.5)">
    <circle cx="0" cy="0" r="120" fill="white" opacity="0.1"/>
    <g stroke="white" stroke-width="12" stroke-linecap="round">
      <line x1="-50" y1="-50" x2="50" y2="50"/>
      <line x1="50" y1="-50" x2="-50" y2="50"/>
    </g>
    <circle cx="-50" cy="-50" r="5" fill="white"/>
    <circle cx="50" cy="-50" r="5" fill="white"/>
    <circle cx="0" cy="0" r="7" fill="white"/>
    <circle cx="-50" cy="50" r="5" fill="white"/>
    <circle cx="50" cy="50" r="5" fill="white"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="50" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="575" r="80" fill="white" opacity="0.05"/>
  <circle cx="100" cy="575" r="60" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="100" r="70" fill="white" opacity="0.05"/>
</svg>
