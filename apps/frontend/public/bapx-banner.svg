<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- bapX Banner SVG -->
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bannerGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="100" r="100" fill="white" opacity="0.05"/>
  <circle cx="100" cy="530" r="80" fill="white" opacity="0.05"/>
  
  <!-- Abstract Network Nodes -->
  <g opacity="0.2">
    <circle cx="200" cy="150" r="6" fill="white"/>
    <circle cx="400" cy="200" r="5" fill="white"/>
    <circle cx="600" cy="150" r="7" fill="white"/>
    <circle cx="800" cy="220" r="6" fill="white"/>
    <circle cx="1000" cy="180" r="8" fill="white"/>
    <circle cx="300" cy="350" r="6" fill="white"/>
    <circle cx="500" cy="400" r="7" fill="white"/>
    <circle cx="700" cy="380" r="5" fill="white"/>
    <circle cx="900" cy="420" r="7" fill="white"/>
    
    <!-- Connection Lines -->
    <line x1="200" y1="150" x2="400" y2="200" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="200" x2="600" y2="150" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="600" y1="150" x2="800" y2="220" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="800" y1="220" x2="1000" y2="180" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="300" y1="350" x2="500" y2="400" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="500" y1="400" x2="700" y2="380" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="700" y1="380" x2="900" y2="420" stroke="white" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Main Logo (Large X with binary dots) -->
  <g transform="translate(150, 315)">
    <circle cx="0" cy="0" r="100" fill="white" opacity="0.1"/>
    <g stroke="white" stroke-width="10" stroke-linecap="round">
      <line x1="-40" y1="-40" x2="40" y2="40"/>
      <line x1="40" y1="-40" x2="-40" y2="40"/>
    </g>
    <circle cx="-40" cy="-40" r="4" fill="white"/>
    <circle cx="40" cy="-40" r="4" fill="white"/>
    <circle cx="0" cy="0" r="6" fill="white"/>
    <circle cx="-40" cy="40" r="4" fill="white"/>
    <circle cx="40" cy="40" r="4" fill="white"/>
  </g>
  
  <!-- Text: bapX -->
  <text x="420" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="140" fill="url(#textGrad)" letter-spacing="-3">
    bap<tspan fill="#8b5cf6">X</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="420" y="410" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="500" font-size="32" fill="rgba(255,255,255,0.8)" letter-spacing="0">
    Your Autonomous AI Worker
  </text>
  
  <!-- Subtitle -->
  <text x="420" y="460" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.6)">
    Built for complex tasks, designed for everything
  </text>
  
  <!-- Bottom Accent Line -->
  <line x1="420" y1="520" x2="1050" y2="520" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Small decorative elements -->
  <circle cx="1080" cy="520" r="5" fill="white" opacity="0.5"/>
  <circle cx="1100" cy="520" r="3" fill="white" opacity="0.5"/>
  <circle cx="1115" cy="520" r="4" fill="white" opacity="0.5"/>
</svg>
